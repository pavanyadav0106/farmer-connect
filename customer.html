<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Dashboard - Products</title>
  <style>
    body {
      font-family: Arial, sans-serif;  
      background-color: #f5f5f5;
      padding: 20px;
      margin: 0;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .product-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .product-card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 200px;
      padding: 15px;
      text-align: center;
    }

    .product-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .product-info {
      margin-top: 10px;
    }

    .product-info h3 {
      margin: 0;
      font-size: 18px;
    }

    .product-info p {
      margin: 5px 0;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Available Products</h1>
  <div id="customerProductList" class="product-list"></div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDPrPDAj7o58AijhzBpytGKcsuxHYCGhaY",
      authDomain: "farmer-connect-8d0ea.firebaseapp.com",
      projectId: "farmer-connect-8d0ea",
      storageBucket: "farmer-connect-8d0ea.appspot.com",
      messagingSenderId: "164327825853",
      appId: "1:164327825853:web:00c05f326aab3c4683b2d4",
      measurementId: "G-B5HJ84QDL6"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Reference to the product list div
    const customerProductList = document.getElementById('customerProductList');

    // Listen for real-time updates
    function listenForProductUpdates() {
      const q = query(
        collection(db, 'products'),
        where('status', '==', 'available'),  // Filter to only show available products
        orderBy('createdAt', 'desc')  // Order by creation date (descending)
      );

      onSnapshot(q, (snapshot) => {
        console.log("Snapshot received:", snapshot); // Check the snapshot object

        customerProductList.innerHTML = ''; // Clear list

        if (snapshot.empty) {
          console.log("No products found!");
          customerProductList.innerHTML = '<p>No products available.</p>';
          return;
        }

        snapshot.forEach(doc => {
          const data = doc.data();
          console.log("Product Data:", data); // Log product data for debugging

          // Ensure 'imageUrl' exists or show default placeholder
          const imageUrl = data.imageUrl || 'https://via.placeholder.com/200';

          // Append product card to the product list
          customerProductList.innerHTML += `
            <div class="product-card">
              <img src="${imageUrl}" alt="${data.name}">
              <div class="product-info">
                <h3>${data.name}</h3>
                <p>₹${data.price}</p>
                <p>${data.quantity} kg</p>
              </div>
            </div>`;
        });
      });
    }

    // Start listening for updates
    listenForProductUpdates();
  </script>

</body>
</html>
