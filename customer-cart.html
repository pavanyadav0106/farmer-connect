<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#28a745">
  <meta name="mobile-web-app-capable" content="yes">
  <title data-i18n="cart.title">My Cart - FarmerConnect</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/android-chrome-512x512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="manifest" href="/assets/site.webmanifest">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <!-- Global Design System -->
  <link rel="stylesheet" href="css/app.css">
  <!-- Page-specific -->
  <link rel="stylesheet" href="css/customer-cart.css"/>

  <!-- Shared Layout System & Guard (Loaded early to prevent flash of content) -->
  <script type="module" src="js/layout-loader.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-nav">Skip to main content</a>

  <!-- Layout Placeholders (Injected dynamically) -->
  <div id="top-nav-placeholder"></div>
  <div id="sidebar-placeholder" data-role="customer"></div>
  <div id="logout-modal-placeholder"></div>

  <main class="main-content" id="main-content" style="margin-top: 80px;">
    <div class="container">
      <div class="cart-items" id="cartItems">
        <!-- Cart items will be dynamically inserted here -->
        <div class="empty-cart">
          <i class="fas fa-shopping-cart"></i>
          <p data-i18n="cart.empty_msg">Your cart is empty</p>
          <a href="customer-marketplace.html" class="btn btn-primary" data-i18n="dashboard.browse_crops">Browse Crops</a>
        </div>
      </div>

      <div class="cart-summary" id="cartSummary">
        <h2 data-i18n="cart.order_summary">Order Summary</h2>
        <div class="summary-row">
          <span><span data-i18n="cart.subtotal">Subtotal</span> (<span id="itemCount">0</span> <span data-i18n="cart.items">items</span>)</span>
          <span id="subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span data-i18n="cart.delivery">Delivery</span>
          <span data-i18n="cart.free">FREE</span>
        </div>
        <div class="summary-row total">
          <span data-i18n="cart.total">Total</span>
          <span id="cartTotal">₹0</span>
        </div>
        <button class="btn btn-primary btn-block" id="checkoutBtn" disabled data-i18n="cart.proceed_checkout">
          Proceed to Checkout
        </button>
      </div>
    </div>
  </main>

  <!-- Checkout Modal -->
  <div class="modal" id="checkoutModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 data-i18n="cart.checkout">Checkout</h2>
        <span class="close-btn">&times;</span>
      </div>
      <div class="modal-body">
        <form id="checkoutForm">
          <div class="form-group">
            <label for="deliveryAddress" data-i18n="cart.delivery_address">Delivery Address</label>
            <textarea id="deliveryAddress" required placeholder="House No, Street, City, State, Pincode" data-i18n-placeholder="cart.address_placeholder"></textarea>
          </div>

          <div class="form-group">
            <label for="contactNumber" data-i18n="cart.contact_number">Contact Number</label>
            <input type="tel" id="contactNumber" placeholder="Enter your phone number" data-i18n-placeholder="cart.phone_placeholder" required pattern="[0-9]{10}"/>
          </div>

          <div class="form-group">
            <label for="deliveryDate" data-i18n="cart.delivery_date">Delivery Date</label>
            <input type="date" id="deliveryDate" required min="" />
          </div>

          <div class="form-group">
            <label for="paymentMethod" data-i18n="cart.payment_method">Payment Method</label>
            <select id="paymentMethod" required>
              <option value="" data-i18n="cart.select_payment">Select payment method</option>
              <option value="cod" data-i18n="cart.cod">Cash on Delivery</option>
              <option value="upi" data-i18n="cart.upi">UPI</option>
              <option value="card" data-i18n="cart.card">Credit/Debit Card</option>
              <option value="wallet" data-i18n="cart.wallet">Wallet</option>
            </select>
          </div>

          <div class="form-group upi-field hidden">
            <label for="upiId" data-i18n="cart.upi_id">UPI ID</label>
            <input type="text" id="upiId" placeholder="example@upi" data-i18n-placeholder="cart.upi_placeholder" />
          </div>

          <div class="form-group card-fields hidden">
            <label for="cardNumber" data-i18n="cart.card_number">Card Number</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" data-i18n-placeholder="cart.card_placeholder" maxlength="19" />
            <label for="expiry" data-i18n="cart.expiry_date">Expiry Date</label>
            <input type="month" id="expiry" />
            <label for="cvv" data-i18n="cart.cvv">CVV</label>
            <input type="password" id="cvv" maxlength="3" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="cancelCheckout" data-i18n="buttons.cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="confirmOrderBtn" data-i18n="cart.place_order">Place Order</button>
      </div>
    </div>
  </div>

  <!-- Order Confirmation Modal -->
  <div class="modal" id="orderConfirmationModal">
    <div class="modal-content confirmation">
      <div class="confirmation-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <h2 data-i18n="cart.order_success">Order Placed Successfully!</h2>
      <p id="orderConfirmationText" data-i18n="cart.thank_you">Thank you for shopping with us.</p>
      <div class="confirmation-buttons">
        <a href="customer-marketplace.html" class="btn btn-secondary" data-i18n="cart.continue_shopping">Continue Shopping</a>
        <a href="customer-orders.html" class="btn btn-primary" id="viewOrderBtn" data-i18n="cart.view_order">View Order</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/language-manager.js"></script>
  <script type="module" src="js/auto-translate.js"></script>
  <script type="module" src="js/customer-cart.js"></script>
</body>
</html>
