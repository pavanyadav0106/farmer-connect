<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cart - FarmerConnect</title>
  
  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/android-chrome-512x512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/assets/site.webmanifest">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <!-- Global Design System -->
  <!-- Page-specific -->

  <!-- Shared Layout System & Guard (Loaded early to prevent flash of content) -->
  <script type="module" crossorigin src="/assets/customerCart-Bp093ggC.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/config--Onoqk_Z.js">
  <link rel="modulepreload" crossorigin href="/assets/layout-loader-LuVZLwht.js">
  <link rel="stylesheet" crossorigin href="/assets/customerCart-DE7Wms4s.css">
  <link rel="stylesheet" crossorigin href="/assets/app-BMiSxBfN.css">
  <link rel="stylesheet" crossorigin href="/assets/customer-darkmode-DJoXn9Xd.css">
</head>
<body>

  <!-- Layout Placeholders (Injected dynamically) -->
  <div id="top-nav-placeholder"></div>
  <div id="sidebar-placeholder" data-role="customer"></div>
  <div id="logout-modal-placeholder"></div>

  <main class="main-content" style="margin-top: 80px;">
    <div class="container">
      <div class="cart-items" id="cartItems">
        <!-- Cart items will be dynamically inserted here -->
        <div class="empty-cart">
          <i class="fas fa-shopping-cart"></i>
          <p>Your cart is empty</p>
          <a href="customer-marketplace.html" class="btn btn-primary">Browse Crops</a>
        </div>
      </div>

      <div class="cart-summary" id="cartSummary">
        <h2>Order Summary</h2>
        <div class="summary-row">
          <span>Subtotal (<span id="itemCount">0</span> items)</span>
          <span id="subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span>FREE</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="cartTotal">₹0</span>
        </div>
        <button class="btn btn-primary btn-block" id="checkoutBtn" disabled>
          Proceed to Checkout
        </button>
      </div>
    </div>
  </main>

  <!-- Checkout Modal -->
  <div class="modal" id="checkoutModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Checkout</h2>
        <span class="close-btn">&times;</span>
      </div>
      <div class="modal-body">
        <form id="checkoutForm">
          <div class="form-group">
            <label for="deliveryAddress">Delivery Address</label>
            <textarea id="deliveryAddress" required placeholder="House No, Street, City, State, Pincode"></textarea>
          </div>

          <div class="form-group">
            <label for="contactNumber">Contact Number</label>
            <input type="tel" id="contactNumber" placeholder="Enter your phone number" required pattern="[0-9]{10}"/>
          </div>

          <div class="form-group">
            <label for="deliveryDate">Delivery Date</label>
            <input type="date" id="deliveryDate" required min="" />
          </div>

          <div class="form-group">
            <label for="paymentMethod">Payment Method</label>
            <select id="paymentMethod" required>
              <option value="">Select payment method</option>
              <option value="cod">Cash on Delivery</option>
              <option value="upi">UPI</option>
              <option value="card">Credit/Debit Card</option>
              <option value="wallet">Wallet</option>
            </select>
          </div>

          <div class="form-group upi-field hidden">
            <label for="upiId">UPI ID</label>
            <input type="text" id="upiId" placeholder="example@upi" />
          </div>

          <div class="form-group card-fields hidden">
            <label for="cardNumber">Card Number</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" />
            <label for="expiry">Expiry Date</label>
            <input type="month" id="expiry" />
            <label for="cvv">CVV</label>
            <input type="password" id="cvv" maxlength="3" />
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="cancelCheckout">Cancel</button>
        <button type="submit" class="btn btn-primary" id="confirmOrderBtn">Place Order</button>
      </div>
    </div>
  </div>

  <!-- Order Confirmation Modal -->
  <div class="modal" id="orderConfirmationModal">
    <div class="modal-content confirmation">
      <div class="confirmation-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <h2>Order Placed Successfully!</h2>
      <p id="orderConfirmationText">Thank you for shopping with us.</p>
      <div class="confirmation-buttons">
        <a href="customer-marketplace.html" class="btn btn-secondary">Continue Shopping</a>
        <a href="customer-orders.html" class="btn btn-primary" id="viewOrderBtn">View Order</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
</body>
</html>
