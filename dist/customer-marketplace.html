<head>

  <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">

  <link rel="manifest" href="/assets/site.webmanifest">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Page-specific -->

  <!-- Shared Layout System & Guard (Loaded early to prevent flash of content) -->
  <script type="module" crossorigin src="/assets/customerMarketplace-BYy_jeOB.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/config--Onoqk_Z.js">
  <link rel="modulepreload" crossorigin href="/assets/layout-loader-LuVZLwht.js">
  <link rel="stylesheet" crossorigin href="/assets/customerMarketplace-DWZK0_ww.css">
  <link rel="stylesheet" crossorigin href="/assets/app-BMiSxBfN.css">
  <link rel="stylesheet" crossorigin href="/assets/customer-darkmode-DJoXn9Xd.css">
  <link rel="stylesheet" crossorigin href="/assets/customer-review-DyVXwu8h.css">
</head>

<body>
  <!-- Layout Placeholders (Injected dynamically) -->
  <div id="top-nav-placeholder"></div>
  <div id="sidebar-placeholder" data-role="customer"></div>
  <div id="logout-modal-placeholder"></div>

  <main class="main-content" style="margin-top: 80px;">
    <div class="container">
      <div class="marketplace-filters">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchCrops" placeholder="Search crops...">
        </div>
        <select id="categoryFilter">
          <option value="all">All Categories</option>
          <option value="vegetables">Vegetables</option>
          <option value="fruits">Fruits</option>
          <option value="grains">Grains</option>
          <option value="other">Others</option>
        </select>
      </div>

      <div class="crops-grid" id="cropsGrid">
        <div class="loading-skeleton">
          <div class="skeleton-img"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal" id="addToCartModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalCropName">Add to Cart</h2>
        <span class="close-btn">&times;</span>
      </div>
      <div class="modal-body">
        <div class="crop-modal-image">
          <img id="modalCropImage" src="" alt="Crop Image">
        </div>
        <div class="crop-modal-details">
          <p class="crop-price" id="modalCropPrice">₹50/kg</p>
          <p class="crop-stock" id="modalCropStock">10 kg available</p>
          
          <div class="quantity-selector">
            <button class="quantity-btn" id="decrementQty">-</button>
            <input type="number" id="quantityInput" value="1" min="1">
            <button class="quantity-btn" id="incrementQty">+</button>
            <span class="unit">kg</span>
          </div>
          
          <div class="total-price">
            <span>Total:</span>
            <span id="modalTotalPrice">₹50</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="addToCartBtn">
          <i class="fas fa-cart-plus"></i> Add to Cart
        </button>
      </div>
    </div>
  </div>

  <div class="pagination-container container" id="pagination"></div>
  <div class="toast" id="toast"></div>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
</body>
</html>
