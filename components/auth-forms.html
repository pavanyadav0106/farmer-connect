<div class="auth-forms">
  <!-- Login Form -->
  <form id="loginForm" class="auth-form">
    <h2 data-i18n="auth.login">Login</h2>
    
    <div class="input-wrapper">
      <input type="email" id="loginEmail" placeholder=" " required data-i18n-placeholder="auth.email">
      <label for="loginEmail" data-i18n="auth.email">Email</label>
    </div>
    
    <div class="input-wrapper">
      <input type="password" id="loginPassword" placeholder=" " required data-i18n-placeholder="auth.password">
      <label for="loginPassword" data-i18n="auth.password">Password</label>
      <i class="fas fa-eye toggle-password" data-target="loginPassword"></i>
    </div>
    
    <a href="#" class="forgot-password" data-i18n="auth.forgot_password">Forgot Password?</a>
    
    <div id="loginError" class="error-message" style="display: none;"></div>
    
    <button type="submit" id="loginBtn" class="button" data-i18n="auth.login">Login</button>
    
    <div class="toggle">
      <span data-i18n="auth.no_account">Don't have an account?</span>
      <a href="#" id="showSignup" data-i18n="auth.signup">Sign Up</a>
    </div>
  </form>

  <!-- Signup Form -->
  <form id="signupForm" class="auth-form" style="display: none;">
    <h2 data-i18n="auth.signup">Sign Up</h2>
    
    <div class="input-wrapper">
      <input type="text" id="signupName" placeholder=" " required data-i18n-placeholder="profile.full_name">
      <label for="signupName" data-i18n="profile.full_name">Full Name</label>
    </div>
    
    <div class="input-wrapper">
      <input type="email" id="signupEmail" placeholder=" " required data-i18n-placeholder="auth.email">
      <label for="signupEmail" data-i18n="auth.email">Email</label>
    </div>
    
    <div class="input-wrapper">
      <input type="password" id="signupPassword" placeholder=" " required data-i18n-placeholder="auth.password">
      <label for="signupPassword" data-i18n="auth.password">Password</label>
      <i class="fas fa-eye toggle-password" data-target="signupPassword"></i>
    </div>
    
    <div class="input-wrapper">
      <input type="password" id="signupConfirm" placeholder=" " required data-i18n-placeholder="auth.confirm_password">
      <label for="signupConfirm" data-i18n="auth.confirm_password">Confirm Password</label>
      <i class="fas fa-eye toggle-password" data-target="signupConfirm"></i>
    </div>
    
    <div id="signupError" class="error-message" style="display: none;"></div>
    
    <button type="submit" id="signupBtn" class="button" data-i18n="auth.register">Register</button>
    
    <div class="toggle">
      <span data-i18n="auth.has_account">Already have an account?</span>
      <a href="#" id="showLogin" data-i18n="auth.login">Login</a>
    </div>
  </form>
</div>
