<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="profile.title">Farmer Profile | Farmer Connect</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/android-chrome-512x512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/assets/site.webmanifest">

  <!-- Icons & CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Global Design System -->
  <link rel="stylesheet" href="css/app.css">
  <!-- Page-specific -->
  <link rel="stylesheet" href="css/farmer-profile.css" />
  
  <!-- Cloudinary Upload Widget -->
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>

  <!-- Shared Layout System & Guard (Loaded early to prevent flash of content) -->
  <script type="module" src="js/layout-loader.js"></script>
</head>
<body>

  <!-- Layout Placeholders (Injected dynamically) -->
  <div id="top-nav-placeholder"></div>
  <div id="sidebar-placeholder" data-role="farmer"></div>
  <div id="logout-modal-placeholder"></div>

  <!-- Main content -->
  <main class="main-content" id="main-content" style="margin-top: 80px;">
    <section class="profile-container" aria-live="polite">
      <!-- Skeleton Loader (overlay) -->
      <div id="profile-skeleton" class="profile-skeleton" aria-hidden="true">
        <div class="skeleton-header">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short"></div>
        </div>

        <div class="skeleton-grid">
          <div class="skeleton-line full"></div>
          <div class="skeleton-line full"></div>
        </div>
        <div class="skeleton-grid">
          <div class="skeleton-line full"></div>
          <div class="skeleton-line full"></div>
        </div>
        <div class="skeleton-line medium" style="margin-top: 14px;"></div>
      </div>

      <!-- Actual Profile Content -->
      <div id="profile-content" class="profile-content">
        <h1>
          <i class="fas fa-user-circle" aria-hidden="true"></i>
          <span data-i18n="profile.title">Profile</span>
        </h1>

        <!-- Profile Photo Section -->
        <section class="photo-section" aria-label="Profile photo">
          <div class="profile-pic-container">
            <img
              src="assets/profile-placeholder.png"
              id="profile-photo"
              class="profile-pic"
              alt="Profile photo" />
            <button
              type="button"
              class="upload-overlay"
              id="upload-overlay"
              aria-label="Change profile photo">
              <i class="fas fa-camera" aria-hidden="true"></i>
            </button>
          </div>

          <!-- Hidden file input -->
          <input type="file" id="photo-upload" accept="image/*" style="display:none" />

          <button id="upload-btn" class="btn btn-primary" type="button">
            <i class="fas fa-cloud-upload-alt" aria-hidden="true"></i>
            <span data-i18n="profile.change_photo">Change Photo</span>
          </button>
          <div id="upload-status" class="upload-status" role="status"></div>
        </section>

        <!-- Profile Form -->
        <form id="profile-form" novalidate>
          <div class="profile-field">
            <label>
              <i class="fas fa-envelope" aria-hidden="true"></i>
              <span data-i18n="auth.email">Email:</span>
            </label>
            <p id="user-email" class="read-only"></p>
          </div>

          <div class="profile-field">
            <label for="user-name">
              <i class="fas fa-user" aria-hidden="true"></i>
              <span data-i18n="profile.full_name">Full Name:</span>
            </label>
            <input
              type="text"
              id="user-name"
              name="user-name"
              autocomplete="name"
              disabled />
          </div>

          <div class="profile-field">
            <label for="user-phone">
              <i class="fas fa-phone" aria-hidden="true"></i>
              <span data-i18n="profile.phone">Phone:</span>
            </label>
            <input
              type="tel"
              id="user-phone"
              name="user-phone"
              autocomplete="tel"
              placeholder="+91XXXXXXXXXX"
              data-i18n-placeholder="profile.phone_placeholder"
              disabled />
          </div>

          <div class="profile-field">
            <label for="user-location">
              <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
              <span data-i18n="profile.location">Location:</span>
            </label>
            <input
              type="text"
              id="user-location"
              name="user-location"
              autocomplete="street-address"
              disabled />
          </div>

          <div class="form-row">
            <div class="profile-field">
              <label for="user-gender">
                <i class="fas fa-venus-mars" aria-hidden="true"></i>
                <span data-i18n="profile.gender">Gender:</span>
              </label>
              <select id="user-gender" name="user-gender" disabled>
                <option value="" data-i18n="select.gender">Select</option>
                <option value="Male" data-i18n="gender.male">Male</option>
                <option value="Female" data-i18n="gender.female">Female</option>
                <option value="Other" data-i18n="gender.other">Other</option>
                <option value="Prefer not to say" data-i18n="gender.not_say">Prefer not to say</option>
              </select>
            </div>

            <div class="profile-field">
              <label for="user-age">
                <i class="fas fa-birthday-cake" aria-hidden="true"></i>
                <span data-i18n="profile.age">Age:</span>
              </label>
              <input
                type="number"
                id="user-age"
                name="user-age"
                min="18"
                max="100"
                disabled />
            </div>
          </div>

          <!-- Profile Actions -->
          <div class="profile-actions">
            <button type="button" id="edit-profile" class="btn btn-secondary">
              <i class="fas fa-edit" aria-hidden="true"></i>
              <span data-i18n="profile.edit_profile">Edit Profile</span>
            </button>
            <button type="submit" id="save-profile" class="btn btn-primary" style="display:none;">
              <i class="fas fa-save" aria-hidden="true"></i>
              <span data-i18n="profile.save_changes">Save Changes</span>
            </button>
            <button type="button" id="change-password" class="btn btn-warning">
              <i class="fas fa-key" aria-hidden="true"></i>
              <span data-i18n="profile.change_password">Change Password</span>
            </button>
          </div>
          
          <div
            id="profile-update-message"
            class="status-message"
            role="alert">
          </div>
        </form>

        <!-- Password Change Section -->
        <section
          id="password-change-box"
          class="password-change-box"
          style="display:none;"
          aria-label="Change password">
          <h3>
            <i class="fas fa-lock" aria-hidden="true"></i>
            <span data-i18n="profile.change_password">Change Password</span>
          </h3>
          
          <div class="profile-field">
            <label for="current-password" data-i18n="profile.current_password">Current Password:</label>
            <div class="password-input">
              <input
                type="password"
                id="current-password"
                autocomplete="current-password" />
              <i class="fas fa-eye toggle-password" aria-hidden="true"></i>
            </div>
          </div>
          
          <div class="profile-field">
            <label for="new-password" data-i18n="profile.new_password">New Password:</label>
            <div class="password-input">
              <input
                type="password"
                id="new-password"
                autocomplete="new-password" />
              <i class="fas fa-eye toggle-password" aria-hidden="true"></i>
            </div>
            <small class="password-hint" data-i18n="auth.password_hint">
              Minimum 8 characters with at least one number.
            </small>
          </div>

          <div class="profile-field">
            <label for="confirm-password" data-i18n="profile.confirm_password">Confirm New Password:</label>
            <div class="password-input">
              <input
                type="password"
                id="confirm-password"
                autocomplete="new-password" />
              <i class="fas fa-eye toggle-password" aria-hidden="true"></i>
            </div>
          </div>

          <div
            id="password-change-message"
            class="status-message"
            role="alert">
          </div>

          <div class="form-actions">
            <button type="button" id="submit-password-change" class="btn btn-danger">
              <i class="fas fa-key" aria-hidden="true"></i>
              <span data-i18n="profile.update_password">Update Password</span>
            </button>
            <button type="button" id="cancel-password-change" class="btn btn-secondary">
              <i class="fas fa-times" aria-hidden="true"></i>
              <span data-i18n="buttons.cancel">Cancel</span>
            </button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script type="module" src="js/language-manager.js"></script>
  <script type="module" src="js/auto-translate.js"></script>
  <script type="module" src="js/farmer-profile.js"></script>
</body>
</html>
